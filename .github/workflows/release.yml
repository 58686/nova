name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build Electron app
        run: npm run electron:build -- --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://cdn.npmmirror.com/binaries/electron-builder-binaries/
          DEBUG: electron-builder

      - name: List build output
        run: |
          Write-Host "=== Build output ===" -ForegroundColor Cyan
          Get-ChildItem release -Recurse | Format-Table Name, Length
        shell: pwsh

      - name: Verify packaged renderer
        run: |
          $asarList = npx asar list release\win-unpacked\resources\app.asar
          if (-not ($asarList | Select-String '\\dist\\index.html' -Quiet)) {
            Write-Error "Packaged app is missing dist/index.html"
            exit 1
          }
        shell: pwsh

      - name: Generate checksums
        run: |
          Get-ChildItem release -File -Filter "Nova*.exe" |
            Get-FileHash -Algorithm SHA256 |
            Select-Object Hash, @{Name="File";Expression={$_.Path | Split-Path -Leaf}} |
            Out-File -FilePath checksums.txt
        shell: pwsh

      - name: Delete existing release for tag
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $repo = "${{ github.repository }}"
          $tag = "${{ github.ref_name }}"
          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($release.id)" -Method Delete -Headers $headers
            Write-Host "Deleted existing release $tag"
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -ne 404) {
              throw
            }
            Write-Host "No existing release for $tag"
          }
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Nova*.exe
            release/*.blockmap
            checksums.txt
          body_path: RELEASE_NOTES_v0.3.0.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

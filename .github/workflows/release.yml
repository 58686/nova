name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build Electron app
        run: npm run electron:build
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          DEBUG: electron-builder

      - name: List build output
        run: |
          Write-Host "=== Build output ===" -ForegroundColor Cyan
          Get-ChildItem release -Recurse | Format-Table Name, Length
        shell: pwsh

      - name: Generate checksums
        run: |
          Get-FileHash release\Nova-Setup-*.exe -Algorithm SHA256 | Select-Object Hash, @{Name="File";Expression={$_.Path | Split-Path -Leaf}} | Out-File -FilePath checksums.txt
          Get-FileHash release\Nova-*-win.zip -Algorithm SHA256 | Select-Object Hash, @{Name="File";Expression={$_.Path | Split-Path -Leaf}} | Out-File -FilePath checksums.txt -Append
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Nova-Setup-*.exe
            release/Nova-*-win.zip
            checksums.txt
          body_path: RELEASE_NOTES_v0.3.0.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build Electron app
        run: npm run electron:build -- --publish never
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://cdn.npmmirror.com/binaries/electron-builder-binaries/
          DEBUG: electron-builder

      - name: List build output
        run: |
          Write-Host "=== Build output ===" -ForegroundColor Cyan
          Get-ChildItem release -Recurse | Format-Table Name, Length
        shell: pwsh

      - name: Generate checksums
        run: |
          Get-ChildItem release -File -Filter "Nova*.exe" |
            Get-FileHash -Algorithm SHA256 |
            Select-Object Hash, @{Name="File";Expression={$_.Path | Split-Path -Leaf}} |
            Out-File -FilePath checksums.txt
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Nova*.exe
            release/*.blockmap
            checksums.txt
          body_path: RELEASE_NOTES_v0.3.0.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
